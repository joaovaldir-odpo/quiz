<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Online</title>
    <meta
      name="description"
      content="Quiz online simples, editavel e pronto para GitHub Pages."
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="./questions.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="quiz-app">
      <section id="stage" class="phone-stage" aria-live="polite">
        <img id="screenImage" class="screen-image" alt="" />
        <div id="hotspots" class="hotspots"></div>
        <div id="fallbackPanel" class="fallback-panel" hidden>
          <h1 id="fallbackTitle">Quiz Online</h1>
          <p id="fallbackText"></p>
        </div>
      </section>
    </main>
  </body>
</html>
